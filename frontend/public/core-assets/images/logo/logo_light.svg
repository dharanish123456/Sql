<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70" width="280" height="70">
  <defs>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e2b93b"/>
    </linearGradient>
  </defs>

  <!-- Dark background matching original -->
  <rect width="280" height="70" fill="#1c1c2e" rx="6"/>

  <!-- Icon box — dark rounded square matching original -->
  <rect x="8" y="8" width="52" height="52" rx="8" fill="#2a2a3e"/>
  <rect x="8" y="8" width="52" height="52" rx="8" fill="none" stroke="#3a3a5c" stroke-width="1"/>

  <!-- N mark inside box — matching original style -->
  <text x="34" y="48"
        font-family="Georgia, serif"
        font-size="36"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle">N</text>

  <!-- Small crm text below N inside box -->
  <text x="34" y="58"
        font-family="Arial, sans-serif"
        font-size="7"
        font-weight="600"
        fill="#c9a84c"
        text-anchor="middle"
        letter-spacing="1">crm</text>

  <!-- NEXOR in white bold — matching original -->
  <text x="72" y="35"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="22"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="0.5">NEXOR</text>

  <!-- CRM in gold — matching original -->
  <text x="175" y="35"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="22"
        font-weight="900"
        fill="#c9a84c"
        letter-spacing="0.5">CRM</text>

  <!-- Tagline matching original -->
  <text x="72" y="52"
        font-family="Arial, sans-serif"
        font-size="10"
        font-weight="400"
        fill="#9999bb"
        letter-spacing="0.3">an innovative crm</text>
</svg>
