<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <!-- Dark background for the icon box -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <!-- Accent gradient for the N mark -->
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c8d0e0"/>
    </linearGradient>
    <!-- Gold accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8c96d"/>
    </linearGradient>
  </defs>

  <!-- Icon Box -->
  <rect x="0" y="4" width="68" height="68" rx="10" ry="10" fill="url(#iconBg)"/>

  <!-- Subtle border on icon box -->
  <rect x="0" y="4" width="68" height="68" rx="10" ry="10"
        fill="none" stroke="#2d3561" stroke-width="1"/>

  <!-- N lettermark — bold geometric -->
  <text x="34" y="52"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44"
        font-weight="700"
        fill="url(#nGrad)"
        text-anchor="middle"
        letter-spacing="-1">N</text>

  <!-- Small CRM badge inside icon -->
  <rect x="14" y="56" width="40" height="11" rx="3" fill="url(#goldGrad)" opacity="0.95"/>
  <text x="34" y="65"
        font-family="Arial, sans-serif"
        font-size="7"
        font-weight="800"
        fill="#1a1a2e"
        text-anchor="middle"
        letter-spacing="1.5">CRM</text>

  <!-- NEXOR text -->
  <text x="82" y="38"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26"
        font-weight="700"
        fill="#1a1a2e"
        letter-spacing="1">NEXOR</text>

  <!-- CRM text in gold -->
  <text x="82" y="38"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26"
        font-weight="700"
        fill="url(#goldGrad)"
        letter-spacing="1"
        dx="86">CRM</text>

  <!-- Tagline -->
  <text x="82" y="56"
        font-family="Arial, sans-serif"
        font-size="10"
        font-weight="400"
        fill="#555e7a"
        letter-spacing="0.8">an innovative crm</text>

  <!-- Decorative underline accent -->
  <line x1="82" y1="61" x2="260" y2="61"
        stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>
</svg>
