	spring.application.name=backend
	server.port=8081
	
	# Database
	spring.datasource.url=${DB_URL}
	spring.datasource.username=${DB_USERNAME:postgres}
	spring.datasource.password=${DB_PASSWORD}
	
	# JPA
	spring.jpa.hibernate.ddl-auto=validate
	spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
	spring.jpa.properties.hibernate.format_sql=true
	spring.jpa.show-sql=true
	
	# Flyway
	spring.flyway.enabled=true
	spring.flyway.locations=classpath:db/migration
	
	# Bootstrap Super Admin
	bootstrap.enabled=${BOOTSTRAP_ENABLED:true}
	bootstrap.superadmin.username=${BOOTSTRAP_SUPERADMIN_USERNAME}
	bootstrap.superadmin.email=${BOOTSTRAP_SUPERADMIN_EMAIL}
	bootstrap.superadmin.password=${BOOTSTRAP_SUPERADMIN_PASSWORD}
	
	# JWT
	security.jwt.secret=${JWT_SECRET}
	
	# Frontend
	app.frontend.url=${FRONTEND_URL:http://localhost:5173}
	app.upload-dir=uploads
	spring.servlet.multipart.max-file-size=20MB
	spring.servlet.multipart.max-request-size=20MB
	
	# Recovery
	recovery.enabled=${RECOVERY_ENABLED:false}
	recovery.secret.token=${RECOVERY_SECRET_TOKEN}
	
	# Refresh Cookie
	auth.refresh-cookie.name=${REFRESH_COOKIE_NAME:refresh_token}
	auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
	auth.refresh-cookie.same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
	auth.refresh-cookie.max-age-days=${REFRESH_COOKIE_MAX_AGE_DAYS:7}
